<!DOCTYPE html>
<!-- saved from url=(0012)about:srcdoc -->
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>習慣チェック【デモ】</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&amp;family=DM+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f10;
    --surface: #1a1a1e;
    --border: #2e2e35;
    --text: #e8e8ec;
    --muted: #5a5a6a;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --btn-default: #252530;
    --btn-hover: #2e2e3e;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    padding: 40px 16px 80px;
  }

  /* デモバナー */
  .demo-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--accent);
    color: #0f0f10;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-align: center;
    padding: 7px;
    z-index: 300;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    margin-top: 32px;
  }
  header .date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  header h1 span { color: var(--accent); }

  .form-wrap {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .category-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 18px 4px 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .question-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .question-row:hover {
    background: rgba(255,255,255,0.015);
    border-radius: var(--radius);
  }
  .q-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    padding-left: 4px;
  }
  .q-label .emoji { margin-right: 6px; font-size: 14px; }
  .btn-group {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
  }
  .btn-group button {
    background: var(--btn-default);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--muted);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    padding: 7px 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
    text-align: center;
  }
  .btn-group button:hover { background: var(--btn-hover); color: var(--text); border-color: #404050; }
  .btn-group button.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }
  .btn-group button.skip-btn {
    color: #3a3a4a;
    font-size: 10px;
    border-style: dashed;
  }
  .btn-group button.skip-btn:hover { color: var(--muted); background: var(--btn-hover); }
  .btn-group button.skip-btn.selected {
    background: transparent;
    border-color: var(--muted);
    color: var(--muted);
    font-weight: 400;
  }
  .q-text-wrap { display: flex; gap: 8px; align-items: center; }
  .q-text-wrap input {
    flex: 1;
    background: var(--btn-default);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border 0.15s;
  }
  .q-text-wrap input:focus { border-color: var(--accent); }
  .q-text-wrap input::placeholder { color: var(--muted); font-size: 11px; }

  .progress-bar-wrap {
    max-width: 560px;
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-track {
    flex: 1; height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .submit-wrap { max-width: 560px; margin: 32px auto 0; }
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #0f0f10;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: opacity 0.2s, transform 0.1s;
  }
  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0f0f10;
    font-weight: 700;
    font-size: 13px;
    padding: 12px 24px;
    border-radius: 40px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 確認オーバーレイ */
  #confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    overflow-y: auto;
    padding: 40px 16px;
  }
  .confirm-inner {
    max-width: 500px;
    margin: 0 auto;
    background: #1a1a1e;
    border: 1px solid #2e2e35;
    border-radius: 14px;
    padding: 24px;
  }
  .confirm-head {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #5a5a6a;
    margin-bottom: 16px;
    letter-spacing: 0.1em;
  }
  /* デモ送信完了画面 */
  #done-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #0f0f10;
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  #done-overlay.show { display: flex; }
  .done-icon { font-size: 56px; margin-bottom: 8px; }
  .done-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .done-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.7; }
  .done-reset {
    background: var(--btn-default);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    padding: 12px 28px;
    cursor: pointer;
  }

  @media (max-width: 420px) {
    .question-row { grid-template-columns: 76px 1fr; }
    .q-label { font-size: 12px; }
    .btn-group button { font-size: 10px; padding: 6px 2px; }
  }
</style>
</head>
<body>

<!-- デモバナー -->
<div class="demo-banner">🎮 DEMO MODE — データは送信されません</div>

<header>
  <div class="date" style="display:flex; align-items:center; justify-content:center; gap:8px;">
    <span id="today-date">2026年5月7日(木)</span>
    <input type="date" id="date-picker" style="background:transparent; border:none; border-bottom:1px solid var(--muted);
      color:var(--muted); font-family:&#39;DM Mono&#39;,monospace; font-size:11px;
      letter-spacing:0.1em; outline:none; cursor:pointer;">
  </div>
  <h1>今日の<span>習慣チェック</span></h1>
</header>

<!-- 進捗バー -->
<div class="progress-bar-wrap">
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-label" id="progress-label">0 / 9</div>
</div>

<div class="form-wrap" id="form-wrap">
  <!-- 運動・メンタル -->
  <div class="category-label">🏃 運動・メンタル</div>
  <div class="question-row" data-key="筋トレ">
    <div class="q-label"><span class="emoji">💪</span>筋トレ</div>
    <div class="btn-group">
      <button data-value="やった">やった</button>
      <button data-value="少しだけ">少しだけ</button>
      <button data-value="やってない">やってない</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
  <div class="question-row" data-key="瞑想">
    <div class="q-label"><span class="emoji">🧘</span>瞑想</div>
    <div class="btn-group">
      <button data-value="10分以上">10分↑</button>
      <button data-value="5分以下">5分↓</button>
      <button data-value="やってない">やってない</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
  <div class="question-row" data-key="AIドリル">
    <div class="q-label"><span class="emoji">🤖</span>AIドリル</div>
    <div class="btn-group">
      <button data-value="しっかり">しっかり</button>
      <button data-value="少しだけ">少しだけ</button>
      <button data-value="やってない">やってない</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
  <!-- 食事・飲み物 -->
  <div class="category-label">🍽 食事・飲み物</div>
  <div class="question-row" data-key="睡眠">
    <div class="q-label"><span class="emoji">😴</span>睡眠</div>
    <div class="btn-group">
      <button data-value="7時間以上">7h↑</button>
      <button data-value="5〜7時間">5〜7h</button>
      <button data-value="5時間未満">5h↓</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
  <div class="question-row" data-key="食事">
    <div class="q-label"><span class="emoji">🥗</span>食事</div>
    <div class="btn-group">
      <button data-value="バランス良い">バランス◎</button>
      <button data-value="普通">普通</button>
      <button data-value="偏り・抜き">偏り</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
  <div class="question-row" data-key="水">
    <div class="q-label"><span class="emoji">💧</span>水</div>
    <div class="btn-group">
      <button data-value="6杯以上">6杯↑</button>
      <button data-value="3〜5杯">3〜5杯</button>
      <button data-value="2杯以下">2杯↓</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
  <div class="question-row" data-key="風呂">
    <div class="q-label"><span class="emoji">🛁</span>風呂</div>
    <div class="btn-group">
      <button data-value="湯船">湯船</button>
      <button data-value="シャワー">シャワー</button>
      <button data-value="なし">なし</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
  <!-- 嗜好品 -->
  <div class="category-label">🍶 嗜好品</div>
  <div class="question-row" data-key="酒">
    <div class="q-label"><span class="emoji">🍺</span>酒</div>
    <div class="btn-group">
      <button data-value="飲んでない">なし</button>
      <button data-value="1〜2杯">1〜2杯</button>
      <button data-value="3杯以上">3杯↑</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
  <div class="question-row" data-key="コーヒー">
    <div class="q-label"><span class="emoji">☕</span>コーヒー</div>
    <div class="btn-group">
      <button data-value="飲んでない">なし</button>
      <button data-value="1〜2杯">1〜2杯</button>
      <button data-value="3杯以上">3杯↑</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
  <!-- 感情ログ -->
  <div class="category-label">💬 感情ログ</div>
  <div class="question-row" data-key="感謝">
    <div class="q-label"><span class="emoji">🙏</span>感謝</div>
    <div class="q-text-wrap">
      <input type="text" id="input-感謝" placeholder="今日感謝したこと（任意）" maxlength="100">
    </div>
  </div>
  <div class="question-row" data-key="イライラ">
    <div class="q-label"><span class="emoji">😤</span>イライラ</div>
    <div class="btn-group">
      <button data-value="なし">なし</button>
      <button data-value="少しあった">少し</button>
      <button data-value="かなりあった">かなり</button>
      <button data-value="null" class="skip-btn">—</button>
    </div>
  </div>
</div>

<div class="submit-wrap">
  <button class="submit-btn" id="submit-btn" onclick="submitForm()">送信する</button>
</div>

<div id="toast">✓ 送信しました</div>

<!-- 確認オーバーレイ -->
<div id="confirm-overlay">
  <div class="confirm-inner">
    <div class="confirm-head">CONFIRM</div>
    <div id="confirm-list" style="margin-bottom:24px;"></div>
    <div style="display:flex; gap:10px;">
      <button onclick="closeConfirm()" style="flex:1; background:#252530; border:1px solid #2e2e35; border-radius:10px; color:#e8e8ec; font-family:&#39;Zen Kaku Gothic New&#39;,sans-serif; font-size:14px; padding:14px; cursor:pointer;">
        戻る
      </button>
      <button onclick="doSubmit()" id="confirm-btn" style="flex:2; background:#c8f060; border:none; border-radius:10px; color:#0f0f10; font-family:&#39;Zen Kaku Gothic New&#39;,sans-serif; font-weight:700; font-size:14px; padding:14px; cursor:pointer;">
        送信する（デモ）
      </button>
    </div>
  </div>
</div>

<!-- デモ完了画面 -->
<div id="done-overlay">
  <div class="done-icon">✅</div>
  <div class="done-title">送信完了！（デモ）</div>
  <div class="done-sub">
    実際のアプリではここでデータが保存されます。<br>
    これはデモ版のため、データは送信されていません。
  </div>
  <button class="done-reset" onclick="resetDemo()">↩ もう一度体験する</button>
</div>

<script>
  // 今日の日付表示
  const now = new Date();
  const todayISO = now.toISOString().split('T')[0];
  const picker = document.getElementById('date-picker');
  picker.value = todayISO;

  function updateDateDisplay(isoStr) {
    const d = new Date(isoStr + 'T00:00:00');
    document.getElementById('today-date').textContent =
      d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  }
  updateDateDisplay(todayISO);
  picker.addEventListener('change', () => updateDateDisplay(picker.value));

  // 4択ボタンの選択処理
  const totalSelectRows = document.querySelectorAll('.question-row .btn-group').length;

  document.querySelectorAll('.btn-group').forEach(group => {
    group.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        updateProgress();
      });
    });
  });

  function updateProgress() {
    let answered = 0;
    document.querySelectorAll('.question-row').forEach(row => {
      const group = row.querySelector('.btn-group');
      if (group && group.querySelector('.selected')) answered++;
    });
    const pct = Math.round((answered / totalSelectRows) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `${answered} / ${totalSelectRows}`;
  }

  function collectData() {
    const data = {
      date: document.getElementById('date-picker').value,
      timestamp: now.toISOString()
    };
    document.querySelectorAll('.question-row').forEach(row => {
      const key = row.dataset.key;
      const group = row.querySelector('.btn-group');
      const textInput = row.querySelector('input');
      if (group) {
        const selected = group.querySelector('.selected');
        if (!selected) { data[key] = null; }
        else if (selected.dataset.value === 'null') { data[key] = null; }
        else { data[key] = selected.dataset.value; }
      } else if (textInput) {
        const val = textInput.value.trim();
        data[key] = val === '' ? null : val;
      }
    });
    return data;
  }

  async function submitForm() {
    const data = collectData();

    // 天気・気温取得（デモでも動かす）
    try {
      const w = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.07&longitude=136.88&current=temperature_2m,weather_code&timezone=Asia%2FTokyo");
      const wj = await w.json();
      data["気温"] = wj.current.temperature_2m + "℃";
      const code = wj.current.weather_code;
      if (code === 0) data["天気"] = "☀️ 快晴";
      else if (code <= 2) data["天気"] = "⛅ 晴れ時々曇り";
      else if (code <= 3) data["天気"] = "☁️ 曇り";
      else if (code <= 67) data["天気"] = "🌧 雨";
      else if (code <= 77) data["天気"] = "❄️ 雪";
      else data["天気"] = "⛈ 荒天";
    } catch {
      data["気温"] = null; data["天気"] = null;
    }

    const labels = {
      date:"日付", 筋トレ:"💪筋トレ", 瞑想:"🧘瞑想", AIドリル:"🤖AIドリル",
      睡眠:"😴睡眠", 食事:"🥗食事", 水:"💧水", 風呂:"🛁風呂",
      酒:"🍺酒", コーヒー:"☕コーヒー", 感謝:"🙏感謝", イライラ:"😤イライラ",
      気温:"🌡気温", 天気:"🌤天気"
    };

    const list = document.getElementById("confirm-list");
    list.innerHTML = Object.entries(data)
      .filter(([k]) => k !== "timestamp")
      .map(([k, v]) => `
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #2e2e35; font-size:13px;">
          <span style="color:#5a5a6a;">${labels[k] || k}</span>
          <span style="color:#e8e8ec;">${v ?? "—"}</span>
        </div>
      `).join("");

    document.getElementById("confirm-overlay").style.display = "block";
    window._pendingData = data;
  }

  function closeConfirm() {
    document.getElementById("confirm-overlay").style.display = "none";
  }

  function doSubmit() {
    // デモ版：実際には送信せず完了画面を表示
    closeConfirm();
    document.getElementById("done-overlay").classList.add("show");
  }

  function resetDemo() {
    document.getElementById("done-overlay").classList.remove("show");
    // フォームリセット
    document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('input[type="text"]').forEach(i => i.value = '');
    document.getElementById('submit-btn').textContent = '送信する';
    document.getElementById('submit-btn').disabled = false;
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>


</body></html>
